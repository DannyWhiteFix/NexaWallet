#GENERAL SETTINGS

# Top-level general rules determine when this pipeline is run:
# - only on merge requests, new tags and changes to dev
# - NOT on any branch except dev
# - will run detached merge request pipelines for any merge request,
#   targeting any branch
# Read more on when to use this template at
# https://docs.gitlab.com/ee/ci/yaml/#workflowrules
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Workflows/MergeRequest-Pipelines.gitlab-ci.yml

workflow:
    rules:
        - if: $CI_MERGE_REQUEST_IID
        - if: $CI_COMMIT_TAG
        - if: $CI_COMMIT_BRANCH == "dev"
        - if: $CI_PIPELINE_SOURCE == "schedule"

# nice overview of tasks dependency in gitalb CI
# https://www.reddit.com/r/gitlab/comments/1bqzxba/comment/kx61xuc/
# (archived: https://archive.is/NYGlN)
stages:
    - static_checks
    - documentation
    - build_depends
    - build
    - build_tests
    - qa_tests
    - benchmark_tests

#####################
# building RPCs doc #
#####################

doc_tests:
    stage: documentation
    image: python:3.10.13
    before_script:
        - cd doc/rpc/
        - pip3 install -r requirements.txt
    script:
        - mkdocs build --verbose --site-dir test
    artifacts:
        paths:
          - test
    rules:
        - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH

pages:
    stage: documentation
    image: python:3.10.13
    before_script:
        - cd doc/rpc/
        - pip3 install -r requirements.txt
    script:
        - mkdocs build --verbose
        # gitlab pages needs the static website content to be stored in
        # a folder named `public` placed at the root dir of the project
        # (it doesn't need to be committedi thou)
        # (https://docs.gitlab.com/ee/user/project/pages/public_folder.html#should-you-commit-the-public-folder)
        - mv public ../../
    artifacts:
        paths:
          - public
    rules:
        - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH


cache: &global_cache_settings
    paths:
        - ccache/

###################
# Gitian binaries #
###################
.docker_common:
    stage: build
    # Environment based on workarounds in this issue:
    # https://gitlab.com/gitlab-org/gitlab-runner/-/issues/27300
    image: bchunlimited/nexa:ubuntu20.04
    cache: {}
    variables:
        DOCKER_HOST: tcp://docker:2375
        DOCKER_DRIVER: overlay2
        DOCKER_TLS_CERTDIR: ""
        DEBIAN_FRONTEND: noninteractive
    services:
        - name: docker:dind
          alias: docker
          command: ["--tls=false"]
    rules:
        - if: ($CI_PIPELINE_SOURCE == "schedule" && $GITIAN == "True")


gitian-binaries:
    stage: build
    extends: .docker_common
    script:
        - apt-get update && apt-get -y --no-install-recommends --no-upgrade -qq install openssh-client apt-cacher-ng ruby docker.io
        - git clone https://gitlab.com/nexa/gitian-builder.git
        - cd gitian-builder
        - export USE_DOCKER=1
        - bin/make-base-vm --suite focal --arch amd64 > make-base-vm.log  2>&1
        - mkdir result
        - mkdir inputs
        - bin/gbuild -j `nproc` -m 6000 --url nexa=$CI_REPOSITORY_URL --commit nexa=$CI_DEFAULT_BRANCH $CI_PROJECT_DIR/contrib/gitian-descriptors/gitian-linux-x86.yml 2&>1 | tee gbuild.log
    artifacts:
        when: always
        paths:
            - ./gitian-builder/build/out/*
            - ./gitian-builder/result/*.yaml
            - ./gitian-builder/var/build.log
            - ./gitian-builder/var/build-script
            - ./gitian-builder/make-base-vm.log
            - ./gitian-builder/gbuild.log
    tags:
        - scheduled
    rules:
        - if: ($CI_PIPELINE_SOURCE == "schedule" && $GITIAN == "True")

######################################################
######## Ubuntu base settings
######################################################
.ubuntu_base:
    image: bchunlimited/nexa:ubuntu20.04

.ubuntu_ccache_scripts:
    extends: .ubuntu_base
    before_script:
        - mkdir -p ccache
        - export CCACHE_BASEDIR=${PWD}
        - export CCACHE_DIR=${PWD}/ccache
        - export CCACHE_COMPILERCHECK=content
        # Limit ccache to 3 GB (from default 5 GB).
        - ccache -M 3G
        - ccache --zero-stats || true

######################################################
######## Linting
######################################################
.ubuntu_cache-linting:
    extends: .ubuntu_ccache_scripts
    cache:
        <<: *global_cache_settings
        key: linting_cache

check-formatting:
    stage: static_checks
    extends: .ubuntu_cache-linting
    needs: []
    script:
        - ./autogen.sh
        - ./configure --enable-glibc-back-compat --enable-reduce-exports
        - make check-formatting
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

######################################################
######## x86_64 Linux + deps as via system lib
######################################################
.cache-ubuntu-nodeps:
    extends: .ubuntu_ccache_scripts
    cache:
        <<: *global_cache_settings
        key: ubuntu_cache-nodeps

build-ubuntu-nodeps:
    stage: build
    extends: .cache-ubuntu-nodeps
    needs: []
    script:
        - ./autogen.sh
        - mkdir build; cd build
        - ../configure --cache-file=config.cache --with-gui=no --enable-glibc-back-compat --enable-reduce-exports
        - make -j `nproc`
        - ccache --show-stats
    artifacts:
        when: always
        paths:
            - ./build/src/nexad
            - ./build/src/nexa-cli
            - ./build/src/nexa-miner
            - ./build/src/nexa-tx
            - ./build/src/test/test_nexa
            - ./build/src/bench/bench_nexa
            - ./build/config.log #in case of configure failure
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

build-ubuntu-nodeps-qt:
    stage: build
    extends: .cache-ubuntu-nodeps
    needs: []
    script:
        - ./autogen.sh
        - mkdir build; cd build
        - ../configure --cache-file=config.cache --with-gui=qt5 --enable-glibc-back-compat --enable-reduce-exports --disable-bench --disable-tests
        - make -j `nproc`
        - ccache --show-stats
    artifacts:
        when: on_failure
        paths:
            - ./build/config.log
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

build-ubuntu-tests-nodeps:
    stage: build_tests
    extends: .cache-ubuntu-nodeps
    needs: ["build-ubuntu-nodeps"]
    cache: {}
    script:
        - (cd build/src; ./test/test_nexa)
    dependencies:
        - build-ubuntu-nodeps
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

