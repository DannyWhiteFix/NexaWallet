######################################################
######## Linux 64 bit, only libnexa from source deps
######################################################
.cache-ubuntu-only-libnexa:
    extends: .ubuntu_ccache_scripts
    cache:
        <<: *global_cache_settings
        key: ubuntu_cache-only-libnexa
        paths:
            - ccache/
            - depends/sources
            - depends/built
            - depends/x86_64-linux-gnu

build-ubuntu-deps-only-libnexa:
    stage: build_depends
    extends: .cache-ubuntu-only-libnexa
    needs: []
    script:
        - cd depends
        - make HOST=x86_64-linux-gnu -j `nproc` ONLY_LIBNEXA=1
    artifacts:
        paths:
            - depends/x86_64-linux-gnu
    rules:
      - if: ($CI_PIPELINE_SOURCE != "schedule" || $EXTENDED_TESTS == "True")

build-ubuntu-only-libnexa:
    stage: build
    extends: .cache-ubuntu-only-libnexa
    needs: [build-ubuntu-deps-only-libnexa]
    script:
        - ./autogen.sh
        - mkdir build; cd build
        - ../configure --enable-shared --enable-debug --enable-only-libnexa --enable-glibc-back-compat --enable-reduce-exports --cache-file=config.cache --prefix=$PWD/../depends/x86_64-linux-gnu CPPFLAGS=-DDEBUG_LOCKORDER
        - make -j `nproc`
        - ccache --show-stats
    dependencies:
        - build-ubuntu-deps-only-libnexa
    artifacts:
        when: always
        paths:
            - ./build/src/.libs/libnexa.*
    rules:
      - if: ($CI_PIPELINE_SOURCE != "schedule" || $EXTENDED_TESTS == "True")


######################################################
######## Linux 64 bit, source deps
######################################################
.cache-ubuntu:
    extends: .ubuntu_ccache_scripts
    cache:
        <<: *global_cache_settings
        key: ubuntu_cache
        paths:
            - ccache/
            - depends/sources
            - depends/built
            - depends/x86_64-linux-gnu

build-ubuntu-deps:
    stage: build_depends
    extends: .cache-ubuntu
    needs: []
    variables:
        CXX: g++-10
        CC: gcc-10
    script:
        - cd depends
        - make HOST=x86_64-linux-gnu -j `nproc`
    artifacts:
        paths:
            - depends/x86_64-linux-gnu
    rules:
      - if: ($CI_PIPELINE_SOURCE != "schedule" || $EXTENDED_TESTS == "True")

build-ubuntu:
    stage: build
    extends: .cache-ubuntu
    needs: [build-ubuntu-deps]
    variables:
        CXX: g++-10
        CC: gcc-10
    script:
        - ./autogen.sh
        - mkdir build; cd build
        - ../configure --enable-shared --enable-debug --enable-zmq --enable-glibc-back-compat --enable-reduce-exports --cache-file=config.cache --prefix=$PWD/../depends/x86_64-linux-gnu CPPFLAGS=-DDEBUG_LOCKORDER
        - make -j `nproc`
        - ccache --show-stats
    dependencies:
        - build-ubuntu-deps
    artifacts:
        when: always
        paths:
            - ./build/src/nexad
            - ./build/src/nexa-cli
            - ./build/src/nexa-miner
            - ./build/src/nexa-tx
            - ./build/src/test/
            - ./build/src/test/test_nexa
            - ./build/src/bench/bench_nexa
            - ./build/qa/*
            - ./build/src/test/*.log
            - ./src/test/*.log
            - ./src/test-suite.log
            - ./build/src/.libs/libnexa.*
    rules:
      - if: ($CI_PIPELINE_SOURCE != "schedule" || $EXTENDED_TESTS == "True")

build-ubuntu-rostrum:
    extends: .ubuntu_base
    stage: build
    cache:
      paths:
        # Paths from Cargo Book, section "Caching the Cargo home in CI"
        - cargohome/bin
        - cargohome/registry/index
        - cargohome/registry/cache
        - cargohome/git/db

    needs: [build-ubuntu-deps]

    variables:
        CARGO_HOME: ${CI_PROJECT_DIR}/cargohome
        # needed due to gcc 9.x bug,see https://gcc.gnu.org/bugzilla/show_bug.cgi?id=95189
        CXX: g++-10
        CC: gcc-10

    before_script:
      - mkdir -p cargohome
      - mkdir -p build

    script:
        # add cargo to PATH
        - export PATH=$PATH:`pwd`/depends/x86_64-linux-gnu/native/bin
        # Prepare make file
        - ./autogen.sh > /dev/null
        - cd build
        # remove cache file to see if it catch new CXX and CC env
        - ../configure --prefix=$PWD/../depends/x86_64-linux-gnu > /dev/null

        - make rostrum

    dependencies:
        - build-ubuntu-deps

    artifacts:
        paths:
            - ./build/src/rostrum
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

build-ubuntu-tests:
    stage: build_tests
    extends: .cache-ubuntu
    needs: ["build-ubuntu"]
    cache: {}
    script:
        - (cd build/src; ./test/test_nexa)
    artifacts:
        when: on_failure
        paths:
            - ./build/src/test/
    dependencies:
        - build-ubuntu
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

test-ubuntu-qa:
    stage: qa_tests
    extends: .cache-ubuntu
    needs: ["build-ubuntu"]
    script:
        - mkdir -p $CI_PROJECT_DIR/cores
        - mkdir -p $CI_PROJECT_DIR/saved-cores
        - echo $CI_PROJECT_DIR/cores/core.%e.%p.%h.%t | tee /proc/sys/kernel/core_pattern
        - cd build;
        - ./qa/pull-tester/rpc-tests.py --coverage --no-ipv6-rpc-listen --gitlab
    dependencies:
        - build-ubuntu
    artifacts:
        when: on_failure
        paths:
            - ./qa/qa_tests/
            - $CI_PROJECT_DIR/saved-cores
            - ./build/src/nexad
            - ./build/ctorout.txt
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

test-ubuntu-qa-extended:
    stage: qa_tests
    extends: .cache-ubuntu
    needs: ["build-ubuntu"]
    script:
        - mkdir -p $CI_PROJECT_DIR/cores
        - mkdir -p $CI_PROJECT_DIR/saved-cores
        - echo $CI_PROJECT_DIR/cores/core.%e.%p.%h.%t | tee /proc/sys/kernel/core_pattern
        - cd build;
        - ./qa/pull-tester/rpc-tests.py --coverage --no-ipv6-rpc-listen --gitlab --extended-only
    dependencies:
        - build-ubuntu
    artifacts:
        when: on_failure
        paths:
            - ./qa/qa_tests/
            - $CI_PROJECT_DIR/saved-cores
            - ./build/src/nexad
            - ./build/ctorout.txt
    tags:
        - scheduled
    rules:
        - if: ($CI_PIPELINE_SOURCE == "schedule" && $EXTENDED_TESTS == "True")


test-ubuntu-benchmarks:
    extends: .ubuntu_base
    stage: benchmark_tests
    needs: ["build-ubuntu-nodeps"]
    script:
        - (./build/src/bench/bench_nexa -evals=1)
    dependencies:
        - build-ubuntu-nodeps
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

test-ubuntu-qa-rostrum:
    stage: qa_tests
    image: python:latest
    needs: ["build-ubuntu", "build-ubuntu-rostrum"]
    variables:
        PIP_CACHE_DIR: $CI_PROJECT_DIR/cache-pip
    cache:
        key: $CI_JOB_NAME
        paths:
            - cache-pip
    before_script:
        - pip install -q psutil
    script:
        - mkdir -p $CI_PROJECT_DIR/cores
        - mkdir -p $CI_PROJECT_DIR/saved-cores
        - echo $CI_PROJECT_DIR/cores/core.%e.%p.%h.%t | tee /proc/sys/kernel/core_pattern

        - export NODE_PATH=`pwd`/build/src/nexad
        - export ROSTRUM_PATH=`pwd`/build/src/rostrum
        - wget https://gitlab.com/nexa/rostrum/-/archive/v12.0.0/rostrum-v12.0.0.tar.gz -O rostrum-master.tar.gz
        - tar -zxf rostrum-master.tar.gz
        - ./rostrum-v12.0.0/test/functional/test_runner.py --no-ipv6-rpc-listen --gitlab
    dependencies:
        - build-ubuntu
        - build-ubuntu-rostrum
    artifacts:
        when: on_failure
        paths:
            - ./qa/qa_tests/
            - $CI_PROJECT_DIR/saved-cores
            - ./build/src/nexad
            - ./build/src/rostrum
            - ./build/ctorout.txt
    rules:
      - if: $CI_PIPELINE_SOURCE != "schedule"

